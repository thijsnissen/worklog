name: Kotlin Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  kotlin-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2
      - name: Check changes
        id: changed-files
        uses: tj-actions/changed-files@24d32ffd492484c1d75e0c0b894501ddb9d30d62 # v47
        with:
          files_ignore: frontend/**
      - if: github.event_name == 'push' || steps.changed-files.outputs.any_changed == 'true'
        name: Setup Eclipse Temurin 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: 25
      - if: github.event_name == 'push' || steps.changed-files.outputs.any_changed == 'true'
        name: Setup Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        with:
          cache-provider: basic
      - if: github.event_name == 'push' || steps.changed-files.outputs.any_changed == 'true'
        name: Build & Test
        working-directory: backend
        run: ./gradlew build
